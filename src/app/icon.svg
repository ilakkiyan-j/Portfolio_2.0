<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#05070E" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark container -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Glowing border -->
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="url(#borderGrad)" stroke-width="2.5" stroke-opacity="0.85"/>

  <!-- Left Bracket < -->
  <path d="M 18 22 L 8 32 L 18 42" stroke="#38BDF8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Center Letter I with Top and Bottom Bars -->
  <path d="M 27 22 L 37 22 M 32 22 L 32 42 M 27 42 L 37 42" stroke="url(#letterGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Right Bracket > -->
  <path d="M 46 22 L 56 32 L 46 42" stroke="#F472B6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
